<!DOCTYPE html>
<html>

<head>
<title>Ebuu | Portfolio</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Helvetica, Arial;
margin:0;
}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

h1{
font-size:70px;
letter-spacing:4px;
margin:0;
}

.tagline{
color:#c00000;
font-size:22px;
margin-top:10px;
}

section{
padding:80px 10%;
}

.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
margin-top:40px;
}

.card{
border:1px solid #c00000;
padding:40px;
transition:0.3s;
cursor:pointer;
}

.card:hover{
background:#c00000;
transform:scale(1.05);
}

footer{
text-align:center;
padding:40px;
color:#777;
}

</style>

</head>

<body>

<header>

<h1>EBUU</h1>
<p class="tagline">designer of beautiful chaos</p>

</header>

<section>

<h2>Selected Work</h2>

<div class="projects">

<div class="card">Advertising Campaign</div>
<div class="card">Typography Experiments</div>
<div class="card">Poster Series</div>
<div class="card">Editorial Design</div>

</div>

</section>

<footer>

<p>beautiful things sometimes grow from broken places</p>

</footer>

</body>

</html>
